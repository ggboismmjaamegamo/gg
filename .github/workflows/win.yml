name: Windows-CRD

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download Chrome Remote Desktop
        run: |
          Invoke-WebRequest https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi -OutFile crd.msi
          Start-Process msiexec.exe -ArgumentList '/i crd.msi /quiet /norestart' -Wait

      - name: Install Chrome
        run: |
          Invoke-WebRequest https://www.google.com/chrome/business/ -OutFile chrome.exe
          Start-Process chrome.exe -ArgumentList '/silent /install' -Wait

      - name: Start Chrome Remote Desktop
        run: |
          echo "Paste your CRD command in next step"

      - name: Keep VM Alive
        run: |
          echo "VM running for 6 hours"
          Start-Sleep -Seconds 21600
