name: Windows-RDP-Ngrok

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:

      - name: Enable RDP
        shell: pwsh
        run: |
          net user gamer Gamer@12345 /add
          net localgroup administrators gamer /add
          reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Download Ngrok
        shell: pwsh
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip

      - name: Configure Ngrok
        shell: pwsh
        run: |
          .\ngrok\ngrok.exe config add-authtoken YOUR_NGROK_TOKEN

      - name: Start Ngrok Tunnel
        shell: pwsh
        run: |
          Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389"

      - name: Show RDP Address
        shell: pwsh
        run: |
          Start-Sleep 10
          Invoke-RestMethod http://127.0.0.1:4040/api/tunnels

      - name: Keep VM Alive
        shell: pwsh
        run: |
          Write-Host "Windows VM running..."
          $end = (Get-Date).AddMinutes(120)
          while((Get-Date) -lt $end){
              Start-Sleep -Seconds 60
          }
