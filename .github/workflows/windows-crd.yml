name: Windows-RDP-ngrok

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:

      - name: Enable RDP
        shell: pwsh
        run: |
          net user gamer P@ssw0rd123! /add
          net localgroup administrators gamer /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Download ngrok
        shell: pwsh
        run: |
          Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
          Expand-Archive ngrok.zip

      - name: Add ngrok token
        shell: pwsh
        run: |
          .\ngrok\ngrok.exe config add-authtoken 34CVEs1yX3NU5P08FasZjvv5371_KreNKCTDy1ZS54hZr8VY

      - name: Start ngrok tunnel
        shell: pwsh
        run: |
          .\ngrok\ngrok.exe tcp 3389

      - name: Keep VM alive
        shell: pwsh
        run: |
          Write-Host "Windows cloud PC running..."
          $end = (Get-Date).AddMinutes(120)
          while((Get-Date) -lt $end){
              Start-Sleep -Seconds 60
          }
