name: Windows-CRD

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Prepare Windows VM
        shell: pwsh
        run: |
          Write-Host "Preparing Windows VM"

      - name: Install Chrome Remote Desktop
        shell: pwsh
        run: |
          Invoke-WebRequest https://dl.google.com/edgedl/chrome-remote-desktop/chromeremotedesktophost.msi -OutFile crd.msi
          Start-Process msiexec.exe -ArgumentList "/i crd.msi /quiet /norestart" -Wait

      - name: Start Chrome Remote Desktop
        shell: pwsh
        run: |
          & "${Env:PROGRAMFILES(X86)}\Google\Chrome Remote Desktop\CurrentVersion\remoting_start_host.exe" --code="4/0AfrIepAjByLOh53l4zcMlOJiBu-aGrLiT9Mi8Xu-O8oZvkmeic8UEcS9HSRCMc4XEb7IGA" --redirect-url="https://remotedesktop.google.com/_/oauthredirect" --name=$Env:COMPUTERNAME

      - name: Keep VM Alive
        shell: pwsh
        run: |
          Write-Host "VM running for about 6 hours"
          $end = (Get-Date).AddHours(6)
          while((Get-Date) -lt $end){
              Start-Sleep -Seconds 60
          }
